global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'transfer-service'
    metrics_path: /q/metrics
    static_configs:
      - targets: ['transfer-service:8080']
  - job_name: 'account-service'
    metrics_path: /q/metrics
    static_configs:
      - targets: ['account-service:8080']
  - job_name: 'customer-service'
    metrics_path: /q/metrics
    static_configs:
      - targets: ['customer-service:8080']
